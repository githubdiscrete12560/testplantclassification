<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linear Algebra · Python & NumPy</title>
  <!-- Font Awesome (optional) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f4f8;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .slide-deck {
      max-width: 1100px;
      width: 100%;
      background: #ffffff;
      border-radius: 2.5rem;
      box-shadow: 0 20px 50px -12px rgba(0, 20, 40, 0.3);
      padding: 2rem 2rem 1.8rem;
      transition: 0.2s;
    }

    /* slide navigation */
    .slide-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      gap: 0.8rem;
    }

    .slide-nav h2 {
      font-weight: 600;
      color: #0b2a44;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .slide-nav h2 i {
      color: #1e6f96;
    }

    .nav-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: #e7eef7;
      border: none;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #1b4d6b;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid transparent;
    }

    .nav-btn:hover {
      background: #d0e1f0;
      border-color: #9bbbd9;
    }

    .nav-btn:active {
      transform: scale(0.96);
    }

    .nav-btn.primary {
      background: #1f6e96;
      color: white;
    }
    .nav-btn.primary:hover {
      background: #15577a;
    }

    .slide-counter {
      font-size: 0.85rem;
      color: #2b5f7c;
      background: #e3edf7;
      padding: 0.2rem 1.2rem;
      border-radius: 30px;
      font-weight: 500;
    }

    /* slide content */
    .slide-content {
      background: #f9fcff;
      border-radius: 2rem;
      padding: 2rem 2.2rem;
      border: 1px solid #deeaf5;
      min-height: 380px;
      transition: 0.2s;
    }

    .slide-content h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #082b42;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .slide-content h2 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #0d314a;
      margin: 0.8rem 0 0.4rem;
    }

    .slide-content h3 {
      font-weight: 600;
      color: #1e4d6b;
      font-size: 1.2rem;
      margin: 1rem 0 0.3rem;
    }

    .slide-content p, .slide-content li {
      color: #1e3d54;
      line-height: 1.6;
      font-size: 1rem;
    }

    .slide-content code {
      background: #e6eef8;
      padding: 0.2rem 0.6rem;
      border-radius: 8px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.9rem;
      color: #043753;
      border: 1px solid #cddef0;
    }

    .slide-content pre {
      background: #0e1f2e;
      color: #e3edf7;
      padding: 1rem 1.4rem;
      border-radius: 16px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.9rem;
      line-height: 1.5;
      margin: 0.8rem 0;
      border: 1px solid #274a63;
    }

    .slide-content pre code {
      background: transparent;
      border: none;
      color: inherit;
      padding: 0;
      font-size: 0.9rem;
    }

    .slide-content .math {
      font-style: italic;
      background: #eef4fb;
      padding: 0.1rem 0.6rem;
      border-radius: 6px;
      font-weight: 500;
    }

    .slide-content .matrix-block {
      background: #eef5fc;
      padding: 0.8rem 1.2rem;
      border-radius: 14px;
      display: inline-block;
      border-left: 4px solid #2a7faa;
      margin: 0.3rem 0;
    }

    .slide-content ul {
      padding-left: 1.4rem;
      margin: 0.4rem 0;
    }

    .slide-content ul li {
      margin-bottom: 0.3rem;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin: 0.5rem 0;
    }

    .table-wrap {
      overflow-x: auto;
      margin: 0.6rem 0;
    }

    .table-wrap table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,20,30,0.04);
    }

    .table-wrap th {
      background: #d6e5f3;
      color: #09334b;
      font-weight: 600;
      padding: 0.5rem 0.8rem;
      text-align: left;
    }

    .table-wrap td {
      padding: 0.5rem 0.8rem;
      border-bottom: 1px solid #e6edf6;
    }

    .table-wrap tr:last-child td {
      border-bottom: none;
    }

    .badge {
      background: #d4e2f1;
      border-radius: 40px;
      padding: 0.1rem 0.8rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #12415e;
      display: inline-block;
    }

    .footer-credit {
      margin-top: 2rem;
      padding-top: 1.2rem;
      border-top: 2px solid #e5eef8;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #2c5a78;
    }

    .footer-credit a {
      color: #1b6b93;
      text-decoration: none;
      font-weight: 500;
    }

    .footer-credit a:hover {
      text-decoration: underline;
    }

    .footer-credit i {
      margin-right: 4px;
    }

    /* responsive */
    @media (max-width: 700px) {
      .slide-deck { padding: 1rem; }
      .slide-content { padding: 1.2rem; }
      .two-col { grid-template-columns: 1fr; }
      .slide-nav { flex-direction: column; align-items: stretch; }
    }

    .hidden { display: none; }
    .mt-1 { margin-top: 0.5rem; }
    .mb-1 { margin-bottom: 0.5rem; }
    .text-center { text-align: center; }
  </style>
</head>
<body>
<div class="slide-deck">

  <!-- navigation -->
  <div class="slide-nav">
    <h2><i class="fas fa-cubes"></i> Linear Algebra · NumPy</h2>
    <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
      <span class="slide-counter" id="slideCounter">1 / 9</span>
      <div class="nav-buttons">
        <button class="nav-btn" id="prevSlide"><i class="fas fa-chevron-left"></i> Prev</button>
        <button class="nav-btn primary" id="nextSlide">Next <i class="fas fa-chevron-right"></i></button>
      </div>
    </div>
  </div>

  <!-- slide container -->
  <div class="slide-content" id="slideContainer">
    <!-- slides will be injected by JS -->
  </div>

  <!-- footer credit -->
  <div class="footer-credit">
    <span><i class="fas fa-code"></i> Built with <a href="https://deepseek.com" target="_blank">DeepSeek</a> &amp; <a href="https://openai.com" target="_blank">OpenAI</a></span>
    <span><i class="far fa-clock"></i> Python · NumPy · 2026</span>
  </div>
</div>

<script>
  // --------------------------------------------------------------
  // SLIDE DATA (9 slides)
  // --------------------------------------------------------------
  const slides = [
    // slide 0: intro + vector
    () => `
      <h1>📐 Vectors & Matrices in Python</h1>
      <p>We represent vectors and matrices using <strong>NumPy arrays</strong>.</p>
      <pre><code>import numpy as np</code></pre>
      <h2>1. Vector</h2>
      <p>A vector is a list of numbers.</p>
      <div class="matrix-block">
        <strong>Math:</strong> v = [3, 4]<sup>T</sup>
      </div>
      <pre><code>v = np.array([3, 4])</code></pre>
      <p><i class="fas fa-arrow-right"></i> Can mean: position, direction, movement, velocity, force, or data features.</p>
      <pre><code>student = np.array([80, 75, 90])  # scores in 3 subjects</code></pre>
    `,

    // slide 1: matrix
    () => `
      <h2>2. Matrix in Python</h2>
      <p>A matrix is a table of numbers.</p>
      <div class="matrix-block">
        <strong>Math:</strong> A = [[2, 1], [0, 1]]
      </div>
      <pre><code>A = np.array([[2, 1],
              [0, 1]])</code></pre>
      <p><i class="fas fa-arrow-right"></i> A matrix can represent a <strong>transformation rule</strong> — scaling, rotation, shear, or projection.</p>
    `,

    // slide 2: dot product
    () => `
      <h2>3. Dot product</h2>
      <p>Measures how much two vectors point in the same direction.</p>
      <div class="matrix-block">
        a · b = 3(4) + 2(0) = 12
      </div>
      <pre><code>a = np.array([3, 2])
b = np.array([4, 0])
dot = np.dot(a, b)   # or a @ b
print(dot)  # 12</code></pre>
      <p><i class="fas fa-arrow-right"></i> In AI: similarity between feature vectors. In graphics: checking front/behind.</p>
    `,

    // slide 3: cross product
    () => `
      <h2>4. Cross product</h2>
      <p>Used with 3D vectors. Creates a vector <strong>perpendicular</strong> to both inputs.</p>
      <div class="matrix-block">
        a = [1,0,0], b = [0,1,0]  →  a × b = [0,0,1]
      </div>
      <pre><code>a = np.array([1, 0, 0])
b = np.array([0, 1, 0])
cross = np.cross(a, b)
print(cross)  # [0 0 1]</code></pre>
      <p><i class="fas fa-arrow-right"></i> Magnitude = area of parallelogram.</p>
      <pre><code>area = np.linalg.norm(cross)
print(area)  # 1.0</code></pre>
    `,

    // slide 4: determinant
    () => `
      <h2>5. Determinant</h2>
      <p>Tells how much a matrix scales area/volume.</p>
      <div class="matrix-block">
        det([[2,1],[0,1]]) = 2(1) - 1(0) = 2
      </div>
      <pre><code>A = np.array([[2, 1], [0, 1]])
det_A = np.linalg.det(A)  # 2.0</code></pre>
      <div class="table-wrap">
        <table>
          <tr><th>det(A)</th><th>Meaning</th></tr>
          <tr><td>≠ 0</td><td>transformed basis vectors independent</td></tr>
          <tr><td>= 0</td><td>space collapses; vectors dependent</td></tr>
          <tr><td>&gt; 0</td><td>orientation preserved</td></tr>
          <tr><td>&lt; 0</td><td>orientation flipped</td></tr>
        </table>
      </div>
      <pre><code>A_collapse = np.array([[1, 2], [2, 4]])
print(np.linalg.det(A_collapse))  # ~0.0</code></pre>
    `,

    // slide 5: matrix transformation
    () => `
      <h2>6. Matrix transformation</h2>
      <p>Multiply a matrix by a vector: <strong>v' = A v</strong></p>
      <div class="matrix-block">
        A = [[2,1],[0,1]],  v = [3,2]  →  v' = [8,2]
      </div>
      <pre><code>A = np.array([[2, 1], [0, 1]])
v = np.array([3, 2])
v_new = A @ v
print(v_new)  # [8 2]</code></pre>
      <p><i class="fas fa-arrow-right"></i> Vector moved from (3,2) to (8,2).</p>
    `,

    // slide 6: basis vectors
    () => `
      <h2>7. Basis vectors &amp; transformation</h2>
      <p>Standard basis vectors in 2D: e₁ = [1,0], e₂ = [0,1]</p>
      <pre><code>e1 = np.array([1, 0])
e2 = np.array([0, 1])

A = np.array([[2, 1], [0, 1]])
Ae1 = A @ e1   # [2 0]
Ae2 = A @ e2   # [1 1]</code></pre>
      <p><i class="fas fa-arrow-right"></i> Columns of matrix show where basis vectors move.</p>
      <div class="badge" style="background:#d1e3f2;">🔑 A matrix transformation moves basis vectors; all other vectors follow.</div>
    `,

    // slide 7: full example
    () => `
      <h2>8. Full Python example</h2>
      <pre><code>import numpy as np

a = np.array([3, 2])
b = np.array([4, 0])
dot = np.dot(a, b)

u = np.array([1, 0, 0])
v = np.array([0, 1, 0])
cross = np.cross(u, v)

A = np.array([[2, 1], [0, 1]])
x = np.array([3, 2])
x_new = A @ x

e1 = np.array([1, 0])
Ae1 = A @ e1

print("dot:", dot)
print("cross:", cross)
print("transformed:", x_new)
print("A e1:", Ae1)</code></pre>
    `,

    // slide 8: summary table
    () => `
      <h2>9. Summary table</h2>
      <div class="table-wrap">
        <table>
          <tr><th>Concept</th><th>Math</th><th>Python</th><th>Meaning</th></tr>
          <tr><td>Vector</td><td>v = [3,4]</td><td><code>np.array([3,4])</code></td><td>data, direction, movement</td></tr>
          <tr><td>Matrix</td><td>A = [[2,1],[0,1]]</td><td><code>np.array([[2,1],[0,1]])</code></td><td>transformation rule</td></tr>
          <tr><td>Dot product</td><td>a · b</td><td><code>np.dot(a,b)</code> or <code>a @ b</code></td><td>alignment / similarity</td></tr>
          <tr><td>Cross product</td><td>a × b</td><td><code>np.cross(a,b)</code></td><td>perpendicular / area</td></tr>
          <tr><td>Determinant</td><td>det(A)</td><td><code>np.linalg.det(A)</code></td><td>area / volume scaling</td></tr>
          <tr><td>Transformation</td><td>A v</td><td><code>A @ v</code></td><td>transform vector</td></tr>
        </table>
      </div>
      <div style="background:#e8f0fa; border-radius:16px; padding:1rem; margin-top:0.8rem;">
        <p style="margin:0;"><i class="fas fa-graduation-cap" style="color:#1a6b93;"></i> <strong>Best classroom explanation:</strong> In Python, vectors are NumPy arrays, matrices are 2D arrays, transformation via <code>@</code>. Dot product measures alignment, cross product gives perpendicular direction and area, determinant tells if space preserves, scales, flips, or collapses.</p>
      </div>
    `
  ];

  // --------------------------------------------------------------
  // SLIDE LOGIC
  // --------------------------------------------------------------
  let currentSlide = 0;
  const totalSlides = slides.length;

  const container = document.getElementById('slideContainer');
  const counter = document.getElementById('slideCounter');

  function renderSlide(index) {
    const content = slides[index]();
    container.innerHTML = content;
    counter.textContent = `${index + 1} / ${totalSlides}`;
    // update URL hash (optional)
    window.location.hash = `slide-${index + 1}`;
  }

  function next() {
    currentSlide = (currentSlide + 1) % totalSlides;
    renderSlide(currentSlide);
  }

  function prev() {
    currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
    renderSlide(currentSlide);
  }

  // event listeners
  document.getElementById('nextSlide').addEventListener('click', next);
  document.getElementById('prevSlide').addEventListener('click', prev);

  // keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      next();
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      prev();
    }
  });

  // initial render
  renderSlide(0);

  // if hash present, jump to that slide
  window.addEventListener('hashchange', () => {
    const hash = window.location.hash;
    if (hash.startsWith('#slide-')) {
      const num = parseInt(hash.replace('#slide-', ''), 10);
      if (!isNaN(num) && num >= 1 && num <= totalSlides) {
        currentSlide = num - 1;
        renderSlide(currentSlide);
      }
    }
  });
</script>

</body>
</html>
