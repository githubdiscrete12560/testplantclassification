<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linear Algebra · Exam Question Bank</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #eef3f8;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .slide-deck {
      max-width: 1150px;
      width: 100%;
      background: #ffffff;
      border-radius: 2.5rem;
      box-shadow: 0 20px 50px -12px rgba(0, 20, 40, 0.3);
      padding: 2rem 2rem 1.8rem;
      transition: 0.2s;
    }

    /* navigation */
    .slide-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      gap: 0.8rem;
    }

    .slide-nav h2 {
      font-weight: 600;
      color: #0b2a44;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .slide-nav h2 i {
      color: #1e6f96;
    }

    .nav-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: #e7eef7;
      border: none;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #1b4d6b;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid transparent;
    }

    .nav-btn:hover {
      background: #d0e1f0;
      border-color: #9bbbd9;
    }
    .nav-btn:active { transform: scale(0.96); }

    .nav-btn.primary {
      background: #1f6e96;
      color: white;
    }
    .nav-btn.primary:hover {
      background: #15577a;
    }

    .slide-counter {
      font-size: 0.85rem;
      color: #2b5f7c;
      background: #e3edf7;
      padding: 0.2rem 1.2rem;
      border-radius: 30px;
      font-weight: 500;
    }

    /* slide content */
    .slide-content {
      background: #f9fcff;
      border-radius: 2rem;
      padding: 2rem 2.2rem;
      border: 1px solid #deeaf5;
      min-height: 400px;
      transition: 0.2s;
    }

    .slide-content h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #082b42;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .slide-content h2 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #0d314a;
      margin: 0.6rem 0 0.3rem;
    }

    .slide-content h3 {
      font-weight: 600;
      color: #1e4d6b;
      font-size: 1.2rem;
      margin: 1rem 0 0.3rem;
    }

    .slide-content h4 {
      font-weight: 600;
      color: #1a4a66;
      font-size: 1rem;
      margin: 0.8rem 0 0.2rem;
    }

    .slide-content p, .slide-content li {
      color: #1e3d54;
      line-height: 1.6;
      font-size: 1rem;
    }

    .slide-content code {
      background: #e6eef8;
      padding: 0.2rem 0.6rem;
      border-radius: 8px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.9rem;
      color: #043753;
      border: 1px solid #cddef0;
    }

    .slide-content pre {
      background: #0e1f2e;
      color: #e3edf7;
      padding: 1rem 1.4rem;
      border-radius: 16px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      margin: 0.6rem 0;
      border: 1px solid #274a63;
    }

    .slide-content pre code {
      background: transparent;
      border: none;
      color: inherit;
      padding: 0;
      font-size: 0.85rem;
    }

    .math-block {
      background: #eef5fc;
      padding: 0.6rem 1.2rem;
      border-radius: 14px;
      display: inline-block;
      border-left: 4px solid #2a7faa;
      margin: 0.3rem 0;
      font-style: italic;
    }

    .question-box {
      background: #f2f8ff;
      border-radius: 16px;
      padding: 1rem 1.4rem;
      margin: 0.6rem 0;
      border-left: 5px solid #1f6e96;
    }

    .question-box strong {
      color: #0a3a57;
    }

    .bloom-tag {
      background: #cfe0f0;
      border-radius: 40px;
      padding: 0.1rem 1rem;
      font-size: 0.7rem;
      font-weight: 700;
      color: #0e3d5a;
      display: inline-block;
      letter-spacing: 0.3px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin: 0.5rem 0;
    }

    .table-wrap {
      overflow-x: auto;
      margin: 0.6rem 0;
    }

    .table-wrap table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,20,30,0.04);
    }

    .table-wrap th {
      background: #d6e5f3;
      color: #09334b;
      font-weight: 600;
      padding: 0.5rem 0.8rem;
      text-align: left;
    }

    .table-wrap td {
      padding: 0.5rem 0.8rem;
      border-bottom: 1px solid #e6edf6;
    }

    .table-wrap tr:last-child td { border-bottom: none; }

    .footer-credit {
      margin-top: 2rem;
      padding-top: 1.2rem;
      border-top: 2px solid #e5eef8;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #2c5a78;
    }

    .footer-credit a {
      color: #1b6b93;
      text-decoration: none;
      font-weight: 500;
    }
    .footer-credit a:hover { text-decoration: underline; }
    .footer-credit i { margin-right: 4px; }

    .badge {
      background: #d4e2f1;
      border-radius: 40px;
      padding: 0.1rem 0.8rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #12415e;
      display: inline-block;
    }

    @media (max-width: 700px) {
      .slide-deck { padding: 1rem; }
      .slide-content { padding: 1.2rem; }
      .two-col { grid-template-columns: 1fr; }
      .slide-nav { flex-direction: column; align-items: stretch; }
    }

    .hidden { display: none; }
    .mt-1 { margin-top: 0.5rem; }
    .mb-1 { margin-bottom: 0.5rem; }
    .text-center { text-align: center; }
  </style>
</head>
<body>
<div class="slide-deck">

  <!-- navigation -->
  <div class="slide-nav">
    <h2><i class="fas fa-chalkboard-teacher"></i> Linear Algebra · Exam Bank</h2>
    <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
      <span class="slide-counter" id="slideCounter">1 / 14</span>
      <div class="nav-buttons">
        <button class="nav-btn" id="prevSlide"><i class="fas fa-chevron-left"></i> Prev</button>
        <button class="nav-btn primary" id="nextSlide">Next <i class="fas fa-chevron-right"></i></button>
      </div>
    </div>
  </div>

  <!-- slide container -->
  <div class="slide-content" id="slideContainer"></div>

  <!-- footer credit -->
  <div class="footer-credit">
    <span><i class="fas fa-code"></i> Built with <a href="https://deepseek.com" target="_blank">DeepSeek</a> &amp; <a href="https://openai.com" target="_blank">OpenAI</a></span>
    <span><i class="far fa-file-alt"></i> Linear Algebra · Bloom's Taxonomy · 2026</span>
  </div>
</div>

<script>
  // --------------------------------------------------------------
  // SLIDE DATA (14 slides)

  const slides = [
    // Slide 0: Title + overview
    () => `

      <p style="font-size:1.1rem;">Vectors · Matrix Transformations · Determinant · Cross Product · Basis Independence</p>
      <div style="background:#e3edf7; border-radius:16px; padding:1rem; margin:1rem 0;">
        <p><strong>📋 Structure:</strong> 18 conceptual questions (Bloom's levels 1–6) + 5 Python implementation questions.</p>
        <p><span class="badge">Suggested score: 30 pts (conceptual) + 20 pts (Python)</span></p>
        <p><i class="fas fa-arrow-right"></i> Each question: 5 pts (conceptual) / 4 pts (Python). Choose 6 total or use as bank.</p>
      </div>
      <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 0.6rem;">
        <span class="bloom-tag">🔵 Remember</span>
        <span class="bloom-tag">🟢 Understand</span>
        <span class="bloom-tag">🟠 Apply</span>
        <span class="bloom-tag">🔴 Analyze</span>
        <span class="bloom-tag">🟣 Evaluate</span>
        <span class="bloom-tag">🟡 Create</span>
        <span class="bloom-tag" style="background:#d4dce8;">🐍 Python</span>
      </div>
    `,

    // Slide 1: Level 1 – Remember (Q1–Q3)
    () => `
      <h2>🔵 Level 1: Remember</h2>
      <div class="question-box">
        <strong>Q1. Define vector magnitude.</strong>
        <p>What is the meaning of the magnitude of a vector?</p>
        <p>Give the formula for v = [x, y]<sup>T</sup>.</p>
      </div>
      <div class="question-box">
        <strong>Q2. Define determinant.</strong>
        <p>For A = [[a, b], [c, d]], write the formula for det(A).</p>
      </div>
      <div class="question-box">
        <strong>Q3. Define standard basis vectors.</strong>
        <p>Write e₁, e₂ in ℝ² and explain why they are called basis vectors.</p>
      </div>
    `,

    // Slide 2: Level 2 – Understand (Q4–Q6)
    () => `
      <h2>🟢 Level 2: Understand</h2>
      <div class="question-box">
        <strong>Q4. Explain determinant and area.</strong>
        <p>Explain why |det([u v])| represents the area of the parallelogram formed by two column vectors.</p>
      </div>
      <div class="question-box">
        <strong>Q5. Explain determinant = 0.</strong>
        <p>Geometrically, what happens when det(A) = 0? What does this mean about transformed basis vectors?</p>
      </div>
      <div class="question-box">
        <strong>Q6. Explain cross product and area.</strong>
        <p>Explain why |u × v| represents the area of the parallelogram formed by two 3D vectors.</p>
      </div>
    `,

    // Slide 3: Level 3 – Apply (Q7–Q9)
    () => `
      <h2>🟠 Level 3: Apply</h2>
      <div class="question-box">
        <strong>Q7. Compute magnitude.</strong>
        <p>v = [3, 4]<sup>T</sup>. Find |v|.</p>
      </div>
      <div class="question-box">
        <strong>Q8. Compute determinant.</strong>
        <p>A = [[2, 1], [0, 3]]. Find det(A). State whether transformed basis vectors are independent.</p>
      </div>
      <div class="question-box">
        <strong>Q9. Compute a transformed vector.</strong>
        <p>A = [[2, 1], [0, 1]], v = [3, 2]<sup>T</sup>. Find A v.</p>
      </div>
    `,

    // Slide 4: Level 4 – Analyze (Q10–Q12)
    () => `
      <h2>🔴 Level 4: Analyze</h2>
      <div class="question-box">
        <strong>Q10. Analyze independence.</strong>
        <p>Transformed basis: A e₁ = [1, 2]<sup>T</sup>, A e₂ = [2, 4]<sup>T</sup>. Are they linearly independent or dependent? Explain.</p>
      </div>
      <div class="question-box">
        <strong>Q11. Analyze space collapse.</strong>
        <p>A = [[1, 2], [2, 4]]. What does this transformation do to the 2D plane? Explain using determinant.</p>
      </div>
      <div class="question-box">
        <strong>Q12. Analyze determinant sign.</strong>
        <p>det(A) = -3. What does this tell us about area scaling, orientation, and invertibility?</p>
      </div>
    `,

    // Slide 5: Level 5 – Evaluate (Q13–Q15)
    () => `
      <h2>🟣 Level 5: Evaluate</h2>
      <div class="question-box">
        <strong>Q13. Evaluate reversibility.</strong>
        <p>Student: “If det(A) = 0, the transformation can still be reversed.” Evaluate: correct or incorrect? Explain.</p>
      </div>
      <div class="question-box">
        <strong>Q14. Evaluate a proposed transformation.</strong>
        <p>A e₁ = [2, 0]<sup>T</sup>, A e₂ = [1, 1]<sup>T</sup>. Is this transformation reversible? Justify.</p>
      </div>
      <div class="question-box">
        <strong>Q15. Evaluate the use of determinant.</strong>
        <p>Student: “The determinant only tells us a number, not geometry.” Evaluate. Explain geometric meaning.</p>
      </div>
    `,

    // Slide 6: Level 6 – Create (Q16–Q18)
    () => `
      <h2>🟡 Level 6: Create</h2>
      <div class="question-box">
        <strong>Q16. Create a scaling matrix.</strong>
        <p>Create a 2×2 matrix that stretches x-axis by 3, keeps y unchanged. Explain where basis vectors move.</p>
      </div>
      <div class="question-box">
        <strong>Q17. Create a shear matrix.</strong>
        <p>Create a 2×2 matrix that keeps e₁ unchanged, moves e₂ to [1, 1]<sup>T</sup>. Describe geometric effect.</p>
      </div>
      <div class="question-box">
        <strong>Q18. Create a matrix with no inverse.</strong>
        <p>Create a 2×2 matrix with dependent transformed basis vectors. Explain why det = 0 and no inverse.</p>
      </div>
    `,

    // Slide 7: Python Q1
    () => `
      <h2>🐍 Python Q1. Vector magnitude</h2>
      <p>Write Python code to compute the magnitude of v = [3, 4]<sup>T</sup>.</p>
      <pre><code>import numpy as np
v = np.array([3, 4])
# compute magnitude</code></pre>
      <div class="question-box">
        <strong>Question:</strong> What is the magnitude of v?
      </div>
    `,

    // Slide 8: Python Q2
    () => `
      <h2>🐍 Python Q2. Determinant &amp; independence</h2>
      <p>Compute det(A) for A = [[2, 1], [0, 3]]. Use determinant to decide linear independence of columns.</p>
      <pre><code>import numpy as np
A = np.array([[2, 1],
              [0, 3]])
# compute determinant
# check if determinant is zero or not</code></pre>
    `,

    // Slide 9: Python Q3
    () => `
      <h2>🐍 Python Q3. Transform a vector</h2>
      <p>Given A = [[2, 1], [0, 1]] and v = [3, 2]<sup>T</sup>, compute A v.</p>
      <pre><code>import numpy as np
A = np.array([[2, 1],
              [0, 1]])
v = np.array([3, 2])
# compute transformed vector</code></pre>
      <div class="question-box">
        <strong>Question:</strong> What is the transformed vector?
      </div>
    `,

    // Slide 10: Python Q4
    () => `
      <h2>🐍 Python Q4. Cross product &amp; area</h2>
      <p>u = [2, 0, 0], v = [0, 3, 0]. Compute u × v and parallelogram area |u × v|.</p>
      <pre><code>import numpy as np
u = np.array([2, 0, 0])
v = np.array([0, 3, 0])
# cross product
# magnitude of cross product</code></pre>
    `,

    // Slide 11: Python Q5
    () => `
      <h2>🐍 Python Q5. Detect space collapse</h2>
      <p>A = [[1, 2], [2, 4]]. Compute determinant and print:</p>
      <pre><code>Independent: transformation preserves the plane
Dependent: transformation collapses the plane</code></pre>
      <pre><code>import numpy as np
A = np.array([[1, 2],
              [2, 4]])
# compute determinant
# if-statement to interpret</code></pre>
    `,

    // Slide 12: Marking rubric
    () => `
      <h2>📊 Suggested Marking Rubric</h2>
      <div class="table-wrap">
        <table>
          <tr><th>Criteria</th><th>Weight</th></tr>
          <tr><td>Correct formula or Python operation</td><td>40%</td></tr>
          <tr><td>Correct calculation / result</td><td>30%</td></tr>
          <tr><td>Correct interpretation</td><td>20%</td></tr>
          <tr><td>Clear explanation or code readability</td><td>10%</td></tr>
        </table>
      </div>
      <div style="background:#e3edf7; border-radius:16px; padding:1rem; margin-top:0.8rem;">
        <p><strong>🎯 Overall learning outcome:</strong> Students should be able to explain, calculate, analyze, and implement basic vector and matrix transformation concepts — magnitude, determinant, cross product, linear independence, and space collapse.</p>
      </div>
    `,

    // Slide 13: Summary / all levels
    () => `
      <h2>📌 Question Bank Summary</h2>
      <div class="two-col">
        <div>
          <h4>🔵 Remember (Q1–3)</h4>
          <p>Definitions: magnitude, determinant, basis vectors</p>
          <h4>🟢 Understand (Q4–6)</h4>
          <p>Det &amp; area, det=0 meaning, cross product &amp; area</p>
          <h4>🟠 Apply (Q7–9)</h4>
          <p>Magnitude, determinant, transform vector</p>
        </div>
        <div>
          <h4>🔴 Analyze (Q10–12)</h4>
          <p>Independence, space collapse, determinant sign</p>
          <h4>🟣 Evaluate (Q13–15)</h4>
          <p>Reversibility, proposed transformation, geometric meaning</p>
          <h4>🟡 Create (Q16–18)</h4>
          <p>Scaling, shear, non-invertible matrix</p>
        </div>
      </div>
      <div style="margin-top:0.8rem; background:#eaf1fa; border-radius:16px; padding:0.6rem 1.2rem;">
        <p><i class="fas fa-laptop-code"></i> <strong>Python:</strong> Q1–Q5 cover magnitude, determinant, transformation, cross product, space collapse.</p>
      </div>
    `
  ];

  // --------------------------------------------------------------
  // SLIDE LOGIC
  // --------------------------------------------------------------
  let currentSlide = 0;
  const totalSlides = slides.length;

  const container = document.getElementById('slideContainer');
  const counter = document.getElementById('slideCounter');

  function renderSlide(index) {
    container.innerHTML = slides[index]();
    counter.textContent = `${index + 1} / ${totalSlides}`;
    window.location.hash = `slide-${index + 1}`;
  }

  function next() {
    currentSlide = (currentSlide + 1) % totalSlides;
    renderSlide(currentSlide);
  }

  function prev() {
    currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
    renderSlide(currentSlide);
  }

  document.getElementById('nextSlide').addEventListener('click', next);
  document.getElementById('prevSlide').addEventListener('click', prev);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      next();
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      prev();
    }
  });

  // initial render
  renderSlide(0);

  window.addEventListener('hashchange', () => {
    const hash = window.location.hash;
    if (hash.startsWith('#slide-')) {
      const num = parseInt(hash.replace('#slide-', ''), 10);
      if (!isNaN(num) && num >= 1 && num <= totalSlides) {
        currentSlide = num - 1;
        renderSlide(currentSlide);
      }
    }
  });
</script>

</body>
</html>
